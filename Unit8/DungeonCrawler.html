<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Dungeon Crawler - SET08101</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div id="game-container">
        <h2>Dungeon Crawler</h2>
        
        <div class="stats-bar">
            <span id="hp-display">HP: 100</span>
            <span id="gold-display">Gold: 0</span>
        </div>

        <div id="log">
            <p class="system">Welcome, adventurer. Click 'Move' to begin.</p>
        </div>

        <div class="actions">
            <button id="btn-move" onclick="move()">Move Forward</button>
            <button id="btn-attack" onclick="attack()" disabled>Attack!</button>
        </div>
    </div>

    <script src="game.js"></script>
</body>
</html>
